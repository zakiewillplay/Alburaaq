<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digity – Order Tracker</title>
    <meta name="description" content="Track your Digity order in real time – see when it's received, being prepared, ready, and served.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://zakiewillplay.github.io/Digity/track.html">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --amber: #e8921a;
            --amber-lt: #f5b445;
            --espresso: #120b05;
            --card-bg: rgba(26,14,6,0.97);
            --glass-border: rgba(232,146,26,0.22);
            --text: #f2e2c8;
            --muted: #9a8068;
            --radius: 18px;
        }
        body.light-mode {
            --espresso: #f8f2e8;
            --card-bg: rgba(255,252,246,1);
            --text: #1c0f05;
            --muted: #7a5c3a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Plus Jakarta Sans', sans-serif;
            background:var(--espresso); color:var(--text);
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; transition:0.4s; padding:1rem;
        }
        .tracker-card {
            background:var(--card-bg); border:1px solid var(--amber);
            border-radius:var(--radius); padding:2rem; max-width:440px;
            width:100%; text-align:center; box-shadow:0 12px 28px rgba(0,0,0,0.4);
        }
        h2 { color:var(--amber); margin-bottom:0.8rem; font-family:'Cormorant Garamond', serif; font-size:2rem; }
        .order-summary {
            background:rgba(255,255,255,0.05); border-radius:14px;
            padding:1rem; margin-bottom:1.5rem; text-align:left;
        }
        .order-summary p { margin:0.3rem 0; font-size:0.9rem; }
        .order-summary strong { color:var(--amber); }
        .status-step {
            display:flex; align-items:center; gap:1rem; padding:0.9rem 1rem;
            margin:0.5rem 0; border-radius:12px; background:rgba(255,255,255,0.04);
            opacity:0.4; transition: all 0.3s ease;
        }
        .status-step.active {
            opacity:1; background:rgba(232,146,26,0.12); border:1px solid var(--amber);
            transform: scale(1.02);
        }
        .status-icon { font-size:1.6rem; }
        .status-info { text-align:left; flex:1; }
        .status-title { font-weight:600; font-size:0.95rem; }
        .status-time { font-size:0.75rem; color:var(--muted); margin-top:0.2rem; }
        .review-section {
            margin-top:2rem; padding:1rem; border-top:1px solid var(--glass-border);
        }
        .stars { display:flex; justify-content:center; gap:0.5rem; margin:1rem 0; }
        .star-btn {
            background:none; border:none; font-size:2rem; cursor:pointer;
            transition: transform 0.2s; color:var(--muted);
        }
        .star-btn.selected { color:var(--amber); transform:scale(1.2); }
        .star-btn:hover { transform:scale(1.3); }
        #commentBox {
            width:100%; padding:0.7rem; border-radius:10px; border:1px solid var(--glass-border);
            background:rgba(255,255,255,0.05); color:var(--text); margin:0.5rem 0;
            font-family:'Plus Jakarta Sans', sans-serif; outline:none;
        }
        #commentBox:focus { border-color:var(--amber); }
        .btn {
            padding:0.7rem 1.8rem; border-radius:30px; border:none;
            background:var(--amber); color:#fff; font-weight:700; cursor:pointer;
            font-size:0.9rem; transition:0.2s;
        }
        .btn:hover { background:var(--amber-lt); transform:translateY(-2px); }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .toast {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background:var(--amber); color:#fff; padding:0.7rem 1.5rem;
            border-radius:30px; font-weight:600; z-index:999; font-size:0.85rem;
        }
        .theme-toggle {
            position:fixed; top:20px; right:20px; background:var(--card-bg);
            border:1px solid var(--glass-border); color:var(--text);
            padding:0.5rem 1rem; border-radius:50px; cursor:pointer; font-size:0.9rem;
        }
    </style>
</head>
<body class="light-mode">
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
    <div class="tracker-card">
        <h2>📦 Your Order</h2>
        <div class="order-summary" id="orderDetails"></div>
        <div id="statusSteps">
            <div class="status-step" id="step-new">
                <span class="status-icon">🆕</span>
                <div class="status-info">
                    <div class="status-title">Order Received</div>
                    <div class="status-time" id="time-new"></div>
                </div>
            </div>
            <div class="status-step" id="step-accepted">
                <span class="status-icon">👨‍🍳</span>
                <div class="status-info">
                    <div class="status-title">Preparing</div>
                    <div class="status-time" id="time-accepted"></div>
                </div>
            </div>
            <div class="status-step" id="step-ready">
                <span class="status-icon">🛎️</span>
                <div class="status-info">
                    <div class="status-title">Ready</div>
                    <div class="status-time" id="time-ready"></div>
                </div>
            </div>
            <div class="status-step" id="step-delivered">
                <span class="status-icon">✅</span>
                <div class="status-info">
                    <div class="status-title">Served</div>
                    <div class="status-time" id="time-delivered"></div>
                </div>
            </div>
        </div>
        <div class="review-section" id="reviewPrompt" style="display:none;">
            <h3>⭐ Rate Your Experience</h3>
            <div class="stars" id="starRating">
                <button class="star-btn" data-rating="1">⭐</button>
                <button class="star-btn" data-rating="2">⭐</button>
                <button class="star-btn" data-rating="3">⭐</button>
                <button class="star-btn" data-rating="4">⭐</button>
                <button class="star-btn" data-rating="5">⭐</button>
            </div>
            <input type="text" id="commentBox" placeholder="Add a comment (optional)">
            <button class="btn" id="submitReviewBtn">Submit Review</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dsbqhorzcbcrjivrgauk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzYnFob3J6Y2JjcmppdnJnYXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTQxMjAsImV4cCI6MjA5NjU5MDEyMH0.mSv--VVeaKzYSUGenYT5uYuIv85A4C0A0eyqT-DWv2o';
        const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');

        let selectedRating = 0;
        let cafeId = null;

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        function applyTheme() {
            const saved = localStorage.getItem('digity_theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.remove('light-mode');
                themeToggle.textContent = '☀️ Light';
            } else {
                document.body.classList.add('light-mode');
                themeToggle.textContent = '🌙 Dark';
            }
        }
        applyTheme();
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('digity_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            applyTheme();
        });

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Star rating selection
        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.rating);
                document.querySelectorAll('.star-btn').forEach(b => {
                    b.classList.toggle('selected', parseInt(b.dataset.rating) <= selectedRating);
                });
            });
        });

        document.getElementById('submitReviewBtn').addEventListener('click', async () => {
            if (!selectedRating) return showToast('Please select a rating');
            const comment = document.getElementById('commentBox').value.trim();
            const { error } = await _sb.from('reviews').insert({
                cafe_id: cafeId,
                order_id: orderId,
                rating: selectedRating,
                comment: comment || null,
                customer_name: 'Guest'
            });
            if (error) { showToast('Review failed: ' + error.message); return; }
            showToast('Thank you for your feedback! 🎉');
            document.getElementById('reviewPrompt').style.display = 'none';
        });

        async function loadOrder() {
            if (!orderId) return;
            const { data: order, error } = await _sb.from('orders').select('*').eq('id', orderId).single();
            if (error || !order) {
                document.getElementById('orderDetails').innerHTML = '<p>Order not found</p>';
                return;
            }
            cafeId = order.cafe_id;

            // Display order summary
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            document.getElementById('orderDetails').innerHTML = `
                <p><strong>Table:</strong> ${order.table_number || 'N/A'}</p>
                <p><strong>Items:</strong> ${items.map(i => i.name + (i.qty > 1 ? ' x' + i.qty : '')).join(', ')}</p>
                <p><strong>Total:</strong> ₹${order.total}</p>
                ${order.special_instructions ? `<p><strong>Notes:</strong> ${order.special_instructions}</p>` : ''}
                <p><small>Order placed: ${new Date(order.created_at).toLocaleTimeString()}</small></p>
            `;

            // Highlight active step based on current status
            const steps = ['new', 'accepted', 'ready', 'delivered'];
            let foundCurrent = false;
            steps.forEach(step => {
                const el = document.getElementById('step-' + step);
                if (order.status === step) {
                    el.classList.add('active');
                    foundCurrent = true;
                } else if (!foundCurrent) {
                    el.classList.add('active');
                }
            });

            // Show review prompt if order is delivered/completed and review not already submitted
            if (order.status === 'delivered' || order.status === 'completed') {
                const { data: existingReview } = await _sb.from('reviews').select('id').eq('order_id', orderId).maybeSingle();
                if (!existingReview) {
                    document.getElementById('reviewPrompt').style.display = 'block';
                }
            }

            // Subscribe to realtime updates
            _sb.channel('order-track-' + orderId)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'orders',
                    filter: `id=eq.${orderId}`
                }, payload => {
                    // Refresh the status display
                    const updatedOrder = payload.new;
                    steps.forEach(step => {
                        const el = document.getElementById('step-' + step);
                        el.classList.remove('active');
                    });
                    let found = false;
                    steps.forEach(step => {
                        const el = document.getElementById('step-' + step);
                        if (updatedOrder.status === step) {
                            el.classList.add('active');
                            found = true;
                        } else if (!found) {
                            el.classList.add('active');
                        }
                    });
                    // Show review prompt when status changes to delivered
                    if (updatedOrder.status === 'delivered' || updatedOrder.status === 'completed') {
                        document.getElementById('reviewPrompt').style.display = 'block';
                    }
                })
                .subscribe();
        }

        loadOrder();

        // Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Digity/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
